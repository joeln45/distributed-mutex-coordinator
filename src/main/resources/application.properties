# =============================================================================
# Distributed Mutex Coordinator — runtime configuration
# =============================================================================
# Edit these to change behaviour without recompiling. The DmeConfig class loads
# this file from the classpath at startup; missing keys cause a fail-fast error.
# =============================================================================

# --- Coordinator networking ---
coordinator.host=127.0.0.1
coordinator.request.port=7000
coordinator.return.port=7001

# --- Anti-starvation ---
# Low-priority requests waiting longer than this threshold get promoted.
coordinator.anti-starvation.threshold.ms=10000

# --- Connection-handler socket timeout ---
# How long the coordinator waits for a node to finish sending its request.
coordinator.connection.read.timeout.ms=5000

# --- Node behaviour ---
# Max time the node waits to receive the granted token before declaring timeout.
node.token.wait.timeout.ms=30000

# Critical section duration is randomised: min + uniform(0, jitter).
node.critical-section.min.ms=3000
node.critical-section.jitter.ms=2000

# --- Node retry policy when coordinator is unreachable ---
node.coordinator.retry.delay.ms=5000
node.coordinator.max.retries=3
node.coordinator.max.unavailable=3

# --- Node periodic health check of the coordinator ---
node.coordinator.health.check.initial.delay.ms=10000
node.coordinator.health.check.interval.ms=30000
node.coordinator.health.check.timeout.ms=2000
